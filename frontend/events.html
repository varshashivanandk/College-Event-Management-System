<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events – CEMS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-dot"></div><div>CEMS<span>.rvu</span></div></a>
  <div class="nav-links">
  <a href="events.html">Events</a>
  <a href="index.html#features">Features</a>
  <a href="create-event.html">+ Create Event</a>
  
</div>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">Home</a> → Events</div>
  <h1>Campus Events</h1>
  <p>Discover, register, and attend everything happening at RV University.</p>
</div>

<div class="filters-bar">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" placeholder="Search events…" id="searchInput" oninput="filterCards()">
  </div>
  <button class="filter-chip active" onclick="setFilter(this,'all')">All Events</button>
  <button class="filter-chip" onclick="setFilter(this,'tech')">Tech</button>
  <button class="filter-chip" onclick="setFilter(this,'cultural')">Cultural</button>
  <button class="filter-chip" onclick="setFilter(this,'sports')">Sports</button>
  <button class="filter-chip" onclick="setFilter(this,'workshop')">Workshop</button>
</div>

<div class="featured-wrap" id="featuredWrap"></div>

<section class="events-section">
  <div class="section-title">
    Upcoming Events <span class="count-badge" id="eventCount"></span>
  </div>
  <div class="events-grid" id="eventsGrid"></div>
  <div class="load-more-wrap">
    <button class="btn-load-more">Load More Events</button>
  </div>
</section>

<footer>
  <div class="footer-logo">CEMS<span>.rvu</span></div>
  <div>College Event Management System · &copy; 2026</div>
  <div>RV University, Bengaluru</div>
</footer>


<script>
  /* ── Auth: hide Create Event for non-coordinators ───────────────────────── */
  (function() {
    const role = sessionStorage.getItem('cemsRole') || '';
    if (role !== 'coordinator') {
      const link = document.querySelector('.nav-links a[href="create-event.html"]');
      if (link) link.style.display = 'none';
    }
  })();

  /* ── Render featured event ──────────────────────────────────────────────── */


  /* ── Render event grid cards ────────────────────────────────────────────── */


  /* ── Filter & search ────────────────────────────────────────────────────── */
  var activeFilter = 'all';

  function setFilter(btn, cat) {
    document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = cat;
    filterCards();
  }

  function filterCards() {
    var query = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.event-card').forEach(function(card) {
      var matchCat    = activeFilter === 'all' || card.dataset.category === activeFilter;
      var matchSearch = card.innerText.toLowerCase().includes(query);
      card.style.display = (matchCat && matchSearch) ? '' : 'none';
    });
    updateCount();
  }

  function updateCount() {
    var visible = document.querySelectorAll('.event-card:not([style*="display: none"]):not([style*="display:none"])').length;
    document.getElementById('eventCount').textContent = visible + ' event' + (visible !== 1 ? 's' : '');
  }

  /* ── Guard register-link clicks (redirect to login if not signed in) ─────── */
  document.addEventListener('click', function(e) {
    var link = e.target.closest('.register-link');
    if (!link) return;
    if (!sessionStorage.getItem('cemsRole')) {
      e.preventDefault();
      sessionStorage.setItem('cemsRedirect', link.getAttribute('href'));
      window.location.href = 'login.html';
    }
  });
 function displayEvents(events) {
  const container = document.getElementById("eventsGrid");

  if (!events.length) {
    container.innerHTML = "<p>No approved events available</p>";
    return;
  }

  container.innerHTML = events.map(ev => `
    <div class="event-card">
      <div class="card-top">
        <span class="card-category">${ev.category}</span>
        <h3>${ev.title}</h3>
        <p class="event-desc">${ev.description}</p>
      </div>

      <div class="card-divider"></div>

      <div class="card-bottom">
        <div class="card-meta">
          <span>📅 <strong>${ev.date}</strong></span>
          <span>📍 <strong>${ev.location || ev.venue || '—'}</strong></span>
        </div>

        <a href="event-register.html?id=${ev._id}&title=${encodeURIComponent(ev.title)}&date=${encodeURIComponent(ev.date)}&venue=${encodeURIComponent(ev.location)}"
           class="card-action register-link">
           Register →
        </a>
      </div>
    </div>
  `).join("");

  document.getElementById("eventCount").textContent =
    events.length + " event" + (events.length !== 1 ? "s" : "");
}



const API_BASE = "http://localhost:5000";

async function loadEvents() {
  try {
    const res = await fetch(`${API_BASE}/events`);
    const data = await res.json();

    console.log("Approved events:", data); // 🔍 MUST SHOW DATA

    displayEvents(data);
  } catch (err) {
    console.log("Error:", err);
  }
}
loadEvents();
</script>
<script src="nav-auth.js"></script>
</body>
</html>
